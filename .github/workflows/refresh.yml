name: Refresh fork signatures

# Daily (and on demand) pull the latest steamclient64.dll via SteamCMD, run
# fork_pattern_dumper.py against it, and commit a new TOML keyed by SHA-256
# (immutable — never overwrites existing files). OpenSteamTool's PatternLoader
# fetches these from the `pattern` branch at runtime.

on:
  workflow_dispatch:
  schedule:
    # Daily at 06:30 UTC — after Valve's typical client push window.
    - cron: '30 6 * * *'

permissions:
  contents: write

concurrency:
  group: refresh-fork-signatures
  cancel-in-progress: false

jobs:
  extract:
    runs-on: windows-latest
    timeout-minutes: 30

    env:
      STEAMCMD_DIR: ${{ github.workspace }}\.steamcmd

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Download SteamCMD
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$env:STEAMCMD_DIR" | Out-Null
          $zip = Join-Path $env:STEAMCMD_DIR steamcmd.zip
          Invoke-WebRequest `
            -Uri https://steamcdn-a.akamaihd.net/client/installer/steamcmd.zip `
            -OutFile $zip
          Expand-Archive -Path $zip -DestinationPath $env:STEAMCMD_DIR -Force
          Remove-Item $zip

      - name: Fetch latest steamclient64.dll
        shell: pwsh
        run: |
          & "$env:STEAMCMD_DIR\steamcmd.exe" +login anonymous +quit
          $sc = Join-Path $env:STEAMCMD_DIR steamclient64.dll
          if (-not (Test-Path $sc)) {
            throw "steamclient64.dll missing after SteamCMD bootstrap"
          }
          Write-Host "::notice::steamclient64.dll = $((Get-Item $sc).Length) bytes"

      - name: Capture build metadata
        id: version
        shell: pwsh
        run: |
          $manifest = Join-Path $env:STEAMCMD_DIR "package\steam_client_win64.manifest"
          $version = "unknown"
          if (Test-Path $manifest) {
            $txt = Get-Content $manifest -Raw
            if ($txt -match '"version"\s*"(\d+)"') { $version = $Matches[1] }
          }
          $sc = Join-Path $env:STEAMCMD_DIR steamclient64.dll
          $sha = (Get-FileHash $sc -Algorithm SHA256).Hash.ToLower()
          "version=$version"  | Out-File -Append $env:GITHUB_OUTPUT
          "sc_sha256=$sha"    | Out-File -Append $env:GITHUB_OUTPUT
          Write-Host "::notice::Steam build = $version"
          Write-Host "::notice::steamclient64.dll SHA-256 = $sha"

      - name: Extract fork signatures
        shell: pwsh
        run: |
          $sc = Join-Path $env:STEAMCMD_DIR steamclient64.dll
          python fork_pattern_dumper.py $sc --out-dir . 2>&1 | Tee-Object -FilePath report.txt
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::fork signature resolution failed — a sig needs re-minting"
            exit 1
          }

      - name: Update README version table
        shell: pwsh
        run: |
          python update_readme.py "${{ steps.version.outputs.version }}" "${{ steps.version.outputs.sc_sha256 }}"

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: report-${{ steps.version.outputs.version }}-${{ github.run_id }}
          path: report.txt
          if-no-files-found: warn

      - name: Commit new TOML to pattern branch
        shell: bash
        run: |
          set -e
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage any new/updated artifacts on main first (sigs JSON edits, README).
          git add steamclient/ README.md steamclient_ida_sigs.json || true

          # Determine if a new SHA TOML appeared.
          if git diff --cached --quiet; then
            echo "No changes to publish."
            exit 0
          fi

          git commit -m "auto: fork signatures for Steam build ${{ steps.version.outputs.version }} (${{ steps.version.outputs.sc_sha256 }})"
          git push origin HEAD:main

          # Mirror the TOMLs to the 'pattern' branch that PatternLoader reads.
          git fetch origin pattern || true
          if git show-ref --verify --quiet refs/remotes/origin/pattern; then
            git checkout -B pattern origin/pattern
          else
            git checkout --orphan pattern
            git rm -rf . >/dev/null 2>&1 || true
          fi
          git checkout main -- steamclient/
          git add steamclient/
          if git diff --cached --quiet; then
            echo "pattern branch already current."
          else
            git commit -m "auto: publish fork patterns for build ${{ steps.version.outputs.version }}"
            git push origin pattern
          fi
